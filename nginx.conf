server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets (videos/images are already compressed).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Long-cache fingerprinted build assets and media.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Always revalidate the HTML entry point.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page fallback to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
